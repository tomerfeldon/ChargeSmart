# Render Blueprint for the ChargeSmart backend (FastAPI).
# In Render: New -> Blueprint -> connect this repo. Set DATABASE_URL and
# CHARGESMART_CORS_ORIGINS (the Vercel frontend URL) as secrets in the dashboard.
services:
  - type: web
    name: chargesmart-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.10"
      - key: CHARGESMART_JWT_SECRET
        generateValue: true        # Render generates a strong secret
      - key: DATABASE_URL
        sync: false                # set in dashboard: your Supabase Session pooler URI
      - key: CHARGESMART_CORS_ORIGINS
        sync: false                # set in dashboard: your Vercel frontend URL
